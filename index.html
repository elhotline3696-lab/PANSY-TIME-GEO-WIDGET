<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Soleil Farm Widget</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 12px;
  }

  /* ── SOLEIL FARM COLORS ──
     Green dark:  #1B3A2D
     Green mid:   #2A5240
     Green light: #3D6B52
     Gold:        #F5C518
     Gold light:  #FDD835
     White:       #FFFFFF
     Cream:       #F0F7F1
  */

  .widget {
    width: 100%;
    max-width: 460px;
    background: linear-gradient(145deg, #1B3A2D 0%, #2A5240 60%, #1B3A2D 100%);
    border-radius: 20px;
    padding: 22px 26px;
    color: #F0F7F1;
    box-shadow: 0 20px 60px rgba(27,58,45,0.5), 0 0 0 1px rgba(245,197,24,0.15);
    position: relative;
    overflow: hidden;
  }

  /* Sunflower glow top-right */
  .widget::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(245,197,24,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  /* Bottom left subtle glow */
  .widget::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(61,107,82,0.3) 0%, transparent 70%);
    pointer-events: none;
  }

  /* BRAND HEADER */
  .brand-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(245,197,24,0.2);
  }
  .brand-icon { font-size: 18px; }
  .brand-name {
    font-size: 11px;
    font-weight: 700;
    color: #F5C518;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #F5C518;
    margin-left: auto;
    animation: pulse 2s infinite;
    box-shadow: 0 0 6px rgba(245,197,24,0.6);
  }
  @keyframes pulse {
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.4; transform:scale(1.4); }
  }
  .live-text { font-size: 10px; color: rgba(245,197,24,0.7); letter-spacing:.06em; }

  /* TOP ROW: Location + Clock */
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .location-block {}
  .location-label {
    font-size: 10px;
    color: rgba(240,247,241,0.45);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 3px;
  }
  .city-name {
    font-size: 17px;
    font-weight: 700;
    color: #F0F7F1;
    line-height: 1.2;
  }

  .clock-block { text-align: right; }
  .time {
    font-size: 40px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -2px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .colon {
    color: #F5C518;
    animation: blink 1s step-start infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .time-sub {
    font-size: 11px;
    color: rgba(240,247,241,0.5);
    margin-top: 3px;
    text-align: right;
  }

  /* DATE ROW */
  .date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }
  .date-pill {
    background: rgba(245,197,24,0.15);
    border: 1px solid rgba(245,197,24,0.35);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 13px;
    font-weight: 700;
    color: #F5C518;
  }
  .weekday-txt {
    font-size: 13px;
    color: rgba(240,247,241,0.6);
    font-weight: 500;
  }
  .lunar-txt {
    margin-left: auto;
    font-size: 11px;
    color: rgba(240,247,241,0.35);
    background: rgba(255,255,255,0.05);
    padding: 3px 9px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.07);
  }

  /* WEATHER MAIN */
  .weather-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(245,197,24,0.12);
    border-radius: 14px;
    margin-bottom: 14px;
  }
  .weather-left { display: flex; align-items: center; gap: 14px; }
  .w-icon {
    font-size: 44px;
    line-height: 1;
    filter: drop-shadow(0 0 14px rgba(245,197,24,0.35));
  }
  .temp-big {
    font-size: 38px;
    font-weight: 800;
    color: #F5C518;
    line-height: 1;
    letter-spacing: -1px;
  }
  .w-desc { font-size: 12px; color: rgba(240,247,241,0.6); margin-top: 3px; }
  .w-feels { font-size: 11px; color: rgba(240,247,241,0.35); margin-top: 2px; }

  .weather-right { display: flex; flex-direction: column; gap: 7px; align-items: flex-end; }
  .detail-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: rgba(240,247,241,0.5);
  }
  .detail-val { color: rgba(240,247,241,0.85); font-weight: 600; }

  /* FORECAST */
  .forecast {
    display: flex;
    gap: 7px;
    margin-bottom: 14px;
  }
  .fc-item {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
    transition: background .15s;
  }
  .fc-item:hover { background: rgba(245,197,24,0.08); border-color: rgba(245,197,24,0.2); }
  .fc-day { font-size: 10px; color: rgba(240,247,241,0.4); text-transform:uppercase; letter-spacing:.07em; margin-bottom:5px; }
  .fc-icon { font-size: 18px; margin-bottom: 4px; }
  .fc-hi { font-size: 13px; font-weight: 700; color: #F5C518; }
  .fc-lo { font-size: 10px; color: rgba(240,247,241,0.35); margin-top:2px; }

  /* STATUS */
  .status-bar {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: rgba(240,247,241,0.25);
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .status-brand { color: rgba(245,197,24,0.4); font-weight:600; letter-spacing:.05em; }

  .loading {
    text-align: center;
    padding: 40px 20px;
    color: rgba(240,247,241,0.5);
    font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid rgba(245,197,24,0.15);
    border-top-color: #F5C518;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="widget" id="widget">
  <div class="loading">
    <div class="spinner"></div>
    Đang xác định vị trí...
  </div>
</div>

<script>
const VI_DAYS = ["Chủ Nhật","Thứ Hai","Thứ Ba","Thứ Tư","Thứ Năm","Thứ Sáu","Thứ Bảy"];
const SHORT = ["CN","T2","T3","T4","T5","T6","T7"];

const WMO_ICONS = {
  0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",48:"🌫",
  51:"🌦",53:"🌦",55:"🌧",61:"🌧",63:"🌧",65:"🌧",
  71:"🌨",73:"🌨",75:"❄️",80:"🌦",81:"🌧",82:"⛈",95:"⛈",99:"⛈"
};
const WMO_DESC = {
  0:"Trời quang",1:"Chủ yếu quang",2:"Có mây rải rác",3:"Nhiều mây",
  45:"Sương mù",48:"Sương mù",51:"Mưa phùn",53:"Mưa phùn",55:"Mưa phùn dày",
  61:"Mưa nhẹ",63:"Mưa vừa",65:"Mưa lớn",80:"Mưa rào",81:"Mưa rào vừa",
  82:"Mưa rào mạnh",95:"Dông bão",99:"Dông mạnh"
};

function pad(n){ return String(n).padStart(2,'0'); }

function getLunar(date){
  const offset = Math.floor((date - new Date('2000-01-06')) / 86400000);
  const ld = Math.floor(offset % 29.5) + 1;
  const lm = Math.floor((offset / 29.5) % 12) + 1;
  return `Âm ${pad(Math.min(ld,29))}/${pad(lm)}`;
}

let clockTimer = null;
function updateClock(){
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const h12 = h%12||12, ampm = h>=12?"PM":"AM";
  const el = document.getElementById('t-time');
  if(el) el.innerHTML = `${pad(h12)}<span class="colon">:</span>${pad(m)}`;
  const s2 = document.getElementById('t-sub');
  if(s2) s2.textContent = `${ampm} · ${pad(s)}s · ${VI_DAYS[now.getDay()]}`;
  const db = document.getElementById('t-date');
  if(db) db.textContent = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;
  const wd = document.getElementById('t-weekday');
  if(wd) wd.textContent = VI_DAYS[now.getDay()];
  const ln = document.getElementById('t-lunar');
  if(ln) ln.textContent = getLunar(now);
}

let cityName = "Đang xác định...";
let wx = null;

function render(){
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const h12 = h%12||12, ampm = h>=12?"PM":"AM";
  const icon = WMO_ICONS[wx.current.weather_code]||"🌡";
  const desc = WMO_DESC[wx.current.weather_code]||"";
  const temp = Math.round(wx.current.temperature_2m);
  const feels = Math.round(wx.current.apparent_temperature);
  const hum = wx.current.relative_humidity_2m;
  const wind = Math.round(wx.current.wind_speed_10m);

  const fcDays = [];
  for(let i=1;i<=4;i++){
    const d=new Date(); d.setDate(d.getDate()+i);
    fcDays.push({
      day: SHORT[d.getDay()],
      icon: WMO_ICONS[wx.daily.weather_code[i]]||"🌡",
      hi: Math.round(wx.daily.temperature_2m_max[i]),
      lo: Math.round(wx.daily.temperature_2m_min[i]),
    });
  }

  document.getElementById('widget').innerHTML = `
    <div class="brand-bar">
      <div class="brand-icon">🌻</div>
      <div class="brand-name">Soleil Farm</div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
        <div class="live-text">LIVE</div>
        <div class="live-dot"></div>
      </div>
    </div>

    <div class="top-row">
      <div class="location-block">
        <div class="location-label">📍 Vị trí</div>
        <div class="city-name">${cityName}</div>
      </div>
      <div class="clock-block">
        <div class="time" id="t-time">${pad(h12)}<span class="colon">:</span>${pad(m)}</div>
        <div class="time-sub" id="t-sub">${ampm} · ${pad(s)}s · ${VI_DAYS[now.getDay()]}</div>
      </div>
    </div>

    <div class="date-row">
      <div class="date-pill" id="t-date">${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}</div>
      <div class="weekday-txt" id="t-weekday">${VI_DAYS[now.getDay()]}</div>
      <div class="lunar-txt" id="t-lunar">${getLunar(now)}</div>
    </div>

    <div class="weather-row">
      <div class="weather-left">
        <div class="w-icon">${icon}</div>
        <div>
          <div class="temp-big">${temp}°C</div>
          <div class="w-desc">${desc}</div>
          <div class="w-feels">Cảm giác ${feels}°C</div>
        </div>
      </div>
      <div class="weather-right">
        <div class="detail-item">💧 <span class="detail-val">${hum}%</span></div>
        <div class="detail-item">💨 <span class="detail-val">${wind} km/h</span></div>
        <div class="detail-item">📊 <span class="detail-val">${Math.round(wx.daily.temperature_2m_max[0])}°/${Math.round(wx.daily.temperature_2m_min[0])}°</span></div>
      </div>
    </div>

    <div class="forecast">
      ${fcDays.map(f=>`
        <div class="fc-item">
          <div class="fc-day">${f.day}</div>
          <div class="fc-icon">${f.icon}</div>
          <div class="fc-hi">${f.hi}°</div>
          <div class="fc-lo">${f.lo}°</div>
        </div>
      `).join('')}
    </div>

    <div class="status-bar">
      <span>Cập nhật ${pad(now.getHours())}:${pad(now.getMinutes())}</span>
      <span class="status-brand">🌻 SOLEIL FARM · PANSY</span>
    </div>
  `;

  if(clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(updateClock, 1000);
}

async function getCity(lat,lon){
  try{
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
    const d = await r.json();
    const a = d.address;
    cityName = a.city||a.town||a.village||a.county||"Việt Nam";
  }catch(e){ cityName = "TP. Hồ Chí Minh"; }
}

async function getWeather(lat,lon){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`;
  const r = await fetch(url);
  wx = await r.json();
}

async function init(){
  if(!navigator.geolocation){
    cityName="TP. Hồ Chí Minh";
    await getWeather(10.7769,106.7009);
    render(); return;
  }
  navigator.geolocation.getCurrentPosition(
    async pos=>{
      const {latitude:la,longitude:lo}=pos.coords;
      await Promise.all([getCity(la,lo),getWeather(la,lo)]);
      render();
    },
    async ()=>{
      cityName="TP. Hồ Chí Minh";
      await getWeather(10.7769,106.7009);
      render();
    },
    {timeout:8000}
  );
}

init();
</script>
</body>
</html>
